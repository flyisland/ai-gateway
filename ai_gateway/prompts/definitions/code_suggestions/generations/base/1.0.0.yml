---
name: Amazon Q Code Generations Agent
model:
  name: amazon_q
  params:
    model_class_provider: amazon_q
    temperature: 0.2
    max_tokens: 2048
    max_retries: 1
unit_primitives:
  - amazon_q_integration
prompt_template:
  system: |
    {% include 'code_suggestions/generations/jinja_template/dotcom/system.jinja' %}
  user: |
    {{user_instruction}}
  assistant: |
    <new_code>
params:
  stop:
    - </new_code>
