---
name: Codestral Refactor Code agent
model:
  name: codestral
  params:
    model_class_provider: litellm
    temperature: 0.3
    max_tokens: 2_048
    max_retries: 1
unit_primitives:
  - refactor_code
prompt_template:
  system: |
    {% include 'chat/refactor_code/system.jinja' %}
  user: |
    {% include 'chat/refactor_code/user_mistral.jinja' %}
params:
  timeout: 60
