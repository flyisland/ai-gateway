---
name: Mistral Gitlab Documentation agent
model:
  name: mistral
  params:
    model_class_provider: litellm
    temperature: 0.1
    max_tokens: 4_096
    max_retries: 1
unit_primitives:
  - documentation_search
prompt_template:
  system: |
    You are a knowledgeable assistant who answers questions solely based on the provided retrieved documents.
  user: |
    {% include 'chat/documentation_search/user/1.0.0.jinja' %}
  assistant: |
    {% include 'chat/documentation_search/assistant/1.0.0.jinja' %}
params:
  timeout: 60
