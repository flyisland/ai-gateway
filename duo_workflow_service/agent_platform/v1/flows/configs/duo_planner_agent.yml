version: "v1"
environment: chat-partial
components:
  # Step 1: Fetch and format all MR data
  - name: "duo_planner_agent"
    type: AgentComponent
    prompt_id: "duo_planner_agent"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:goal"
        as: "goal"
    toolset:
      - "get_epic"
      - "get_epic_note"
      - "get_issue"
      - "get_issue_note"
      - "gitlab_issue_search"
      - "list_epic_notes"
      - "list_epics"
      - "list_issue_notes"
      - "list_issues"
      - "gitlab_milestone_search"
      - "gitlab_documentation_search"
      - "get_work_item"
      - "list_work_items"
      - "get_work_item_notes"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"
routers:
  - from: "duo_planner"
    to: "end"
flow:
  entry_point: "duo_planner"
