version: "experimental"
environment: remote

components:
  - name: "gather_context"
    type: AgentComponent
    prompt_id: "resolve_pipeline_finding_context"
    prompt_version: "^1.0.0"
    inputs:
      - { from: "context:goal", as: "security_finding_input" }
      - { from: "context:inputs.pipeline_finding_info.pipeline_id", as: "pipeline_id" }
      - { from: "context:inputs.pipeline_finding_info.finding_uuid", as: "finding_uuid" }
      - { from: "context:project_http_url_to_repo", as: "repository_url" }
    toolset: ["get_security_finding_details", "read_file", "grep", "find_files", "list_dir"]
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

  - name: "execute_fix"
    type: AgentComponent
    prompt_id: "resolve_pipeline_finding_execution"
    prompt_version: "^1.0.0"
    inputs:
      - { from: "context:gather_context.final_answer", as: "finding_context" }
    toolset: ["read_file", "edit_file", "create_file_with_contents"]
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

  - name: "commit_and_push"
    type: AgentComponent
    prompt_id: "resolve_pipeline_finding_commit_and_push"
    prompt_version: "^1.0.0"
    inputs:
      - { from: "context:gather_context.final_answer", as: "finding_context" }
      - { from: "context:project_http_url_to_repo", as: "repository_url" }
      - { from: "context:workflow_id", as: "workflow_id" }
    toolset: ["run_git_command"]
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

  - name: "evaluate_mr"
    type: AgentComponent
    prompt_id: "resolve_pipeline_evaluate_mr_readiness"
    prompt_version: "^1.0.0"
    inputs:
      - { from: "context:gather_context.final_answer", as: "finding_context" }
      - { from: "context:execute_fix.final_answer", as: "fix_execution_result" }
      - { from: "context:commit_and_push.final_answer", as: "git_operations_result" }
      - { from: "context:project_http_url_to_repo", as: "repository_url" }
      - { from: "context:workflow_id", as: "workflow_id" }
    toolset: ["get_merge_request", "list_merge_request_diffs"]
    ui_log_events:
      - "on_agent_final_answer"

routers:
  - from: "gather_context"
    to: "execute_fix"
  - from: "execute_fix"
    to: "commit_and_push"
  - from: "commit_and_push"
    to: "evaluate_mr"
  - from: "evaluate_mr"
    to: "end"

flow:
  entry_point: "gather_context"
  inputs:
    - category: pipeline_finding_info
      input_schema:
        pipeline_id:
          type: integer
          description: "Numeric Pipeline ID"
        finding_uuid:
          type: string
          format: uuid
          description: "Security finding UUID"
