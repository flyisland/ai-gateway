version: "experimental"
environment: remote
components:
  # Example agent with contradiction detection (controlled by DUO_WORKFLOW_ENABLE_CONTRADICTION_DETECTION env var)
  - name: "agent_with_contradiction_detection"
    type: AgentComponent
    prompt_id: "general_assistant"
    prompt_version: "^1.0.0"
    # Contradiction detection is now controlled by environment variable: DUO_WORKFLOW_ENABLE_CONTRADICTION_DETECTION
    inputs:
      - from: "context:goal"
        as: "user_goal"
    toolset:
      - "get_issue"
      - "list_issues"
      - "create_issue"
      - "get_project"
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"
      - "on_agent_final_answer"

  # Alternative: standalone contradiction detection component with custom configuration
  - name: "standalone_contradiction_detector"
    type: ContradictionDetectionComponent
    model_name: "claude-sonnet-4.0"  # Optional: override default model (default: claude-haiku-4.0)
    temperature: 0.0  # Optional: temperature for LLM (default: 0.0)
    max_tokens: 1024  # Optional: max tokens (default: 1024)
    confidence_threshold: 0.8  # Optional: min confidence to flag (default: 0.7)
    inputs:
      - from: "context:agent_with_contradiction_detection.contradiction_analysis"
        as: "previous_analysis"

routers:
  - from: "agent_with_contradiction_detection"
    to: "standalone_contradiction_detector"
  - from: "standalone_contradiction_detector"
    to: "end"

flow:
  entry_point: "agent_with_contradiction_detection"