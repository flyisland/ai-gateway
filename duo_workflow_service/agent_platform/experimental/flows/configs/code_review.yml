version: "experimental"
environment: remote
components:
  # Step 1: Get basic MR data
  - name: "fetch_mr_data"
    type: OneOffComponent
    prompt_id: "code_review_fetch_data"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:goal"
        as: "merge_request_iid"
      - from: "context:project_id"
        as: "project_id"
    toolset:
      - "get_merge_request"
      - "list_merge_request_diffs"
    max_correction_attempts: 3
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  # Step 2: Get repository files
  - name: "fetch_files"
    type: OneOffComponent
    prompt_id: "code_review_fetch_files"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:fetch_mr_data.tool_responses"
        as: "mr_data"
      - from: "context:project_id"
        as: "project_id"
    toolset:
      - "get_repository_files"
    max_correction_attempts: 3
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  # Step 3: Format all data
  - name: "format_for_review"
    type: AgentComponent
    prompt_id: "code_review_format"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:fetch_mr_data.tool_responses"
        as: "mr_data"
      - from: "context:fetch_files.tool_responses"
        as: "files_data"
    toolset: []
    ui_log_events:
      - "on_agent_final_answer"

  # Step 4: Pre-scan codebase for context
  - name: "prescan_codebase"
    type: AgentComponent
    prompt_id: "code_review_prescan"
    prompt_version: "^1.0.0"
    inputs:
      - from: "context:format_for_review.final_answer"
        as: "formatted_mr_input"
      - from: "context:project_id"
        as: "project_id"
    toolset:
      - "list_repository_tree"
      - "get_repository_file"
      - "read_file"
      - "find_files"
      - "blob_search"
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"
      - "on_agent_final_answer"

  # Step 5: Perform code review
  - name: "perform_code_review"
    type: AgentComponent
    prompt_id: "review_merge_request"
    prompt_version: "^1.4.0"
    inputs:
      - from: "context:format_for_review.final_answer"
        as: "formatted_mr_input"
      - from: "context:prescan_codebase.final_answer"
        as: "codebase_context"
      - from: "context:current_date"
        as: "current_date"
    toolset: []

  # Step 6: Publish code review
  - name: "publish_review"
    type: DeterministicStepComponent
    tool_name: "post_duo_code_review"
    inputs:
      - from: "context:perform_code_review.final_answer"
        as: "review_output"
      - from: "context:project_id"
        as: "project_id"
      - from: "context:goal"
        as: "merge_request_iid"
    ui_log_events:
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

routers:
  - from: "fetch_mr_data"
    to: "fetch_files"
  - from: "fetch_files"
    to: "format_for_review"
  - from: "format_for_review"
    to: "prescan_codebase"
  - from: "prescan_codebase"
    to: "perform_code_review"
  - from: "perform_code_review"
    to: "publish_review"
  - from: "publish_review"
    to: "end"

flow:
  entry_point: "fetch_mr_data"
