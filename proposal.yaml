version: 1
environment: remote # Environment represents target execution environment - local or remote
components:
  - name: "agent"
    type: AgentComponent
    prompt_id: "agents/awesome"
    prompt_version: "^1.0.0"
    inputs: ["context:goal"]
    output_type: "AgentFinalOutput"
    output: "context:agent.answer"
    ui_log_events:
      llm: true
      tools: ["on_execution_success"]
    toolset:
      - "read_file"
      - "list_dir"
      - "find_files"
      - "grep"
      - "create_file_with_contents"
      - "edit_file"
      - "mkdir"
  - name: "human_input"
    type: HiltChatBackComponent
    output: "conversation_history:agent"
  - name: "end"
    type: EndComponent
routers:
  - from: "agent"
    to: "human_input"
  - from: "human_input"
    condition:
      input: "status"
      routes:
        "Execution": "agent"
        "default_route": "end"
flow:
  entry_point: "agent"
